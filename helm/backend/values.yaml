replicaCount: 1

image:
  repository: "us-central1-docker.pkg.dev/your-project-id/app-repo/rick-and-morty-app"
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: chart-backend.local
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

env:
  PORT: "8080"
  GCP_PROJECT_ID: ""
  GCP_REGION: ""
